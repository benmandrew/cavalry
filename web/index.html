<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cavalry — client-side verifier</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%E2%99%9E%3C/text%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:," />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --panel: #f5f6f8;
        --border: #d9dce1;
        --fg: #1a1c20;
        --muted: #6b7280;
        --ok: #1f883d;
        --bad: #cf222e;
        --busy: #9a6700;
        --accent: #0969da;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        /* Shared editor metrics: the gutter, highlight layer and textarea must
           agree exactly or the overlaid text drifts out of alignment. */
        --fs: 14px;
        --lh: 21px;
        --pad-y: 16px;
        --pad-x: 18px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --panel: #161b22;
          --border: #30363d;
          --fg: #e6edf3;
          --muted: #8b949e;
          --ok: #3fb950;
          --bad: #f85149;
          --busy: #d29922;
          --accent: #58a6ff;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
      }
      header h1 { font-size: 25px; font-weight: 600; margin: 0; }
      header .sub { color: var(--muted); font-size: 12px; }
      .example-picker {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .example-picker select {
        font: inherit;
        color: var(--fg);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 8px;
        cursor: pointer;
      }
      .pill {
        margin-left: 12px;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        white-space: nowrap;
      }
      .pill.ok { color: var(--ok); border-color: var(--ok); }
      .pill.bad { color: var(--bad); border-color: var(--bad); }
      .pill.busy { color: var(--busy); border-color: var(--busy); }
      main {
        flex: 1;
        display: grid;
        grid-template-rows: 1fr auto;
        min-height: 0;
      }
      /* The editor is a transparent textarea laid over a highlighted <pre>, with
         a line-number gutter down the left. All three share the metrics above so
         the caret sits exactly on the coloured text; JS keeps them scrolled in
         lockstep. */
      .editor-wrap {
        position: relative;
        min-height: 0;
        display: flex;
        overflow: hidden;
        background: var(--bg);
      }
      .gutter {
        flex: 0 0 auto;
        padding: var(--pad-y) 8px var(--pad-y) 14px;
        text-align: right;
        color: var(--muted);
        background: var(--panel);
        border-right: 1px solid var(--border);
        font-family: var(--mono);
        font-size: var(--fs);
        line-height: var(--lh);
        white-space: pre;
        overflow: hidden;
        user-select: none;
      }
      .code-scroll { position: relative; flex: 1; min-width: 0; }
      .highlight,
      #editor {
        margin: 0;
        padding: var(--pad-y) var(--pad-x);
        border: 0;
        font-family: var(--mono);
        font-size: var(--fs);
        line-height: var(--lh);
        tab-size: 2;
        white-space: pre;
        overflow-wrap: normal;
      }
      .highlight {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        color: var(--fg); /* fallback colour for any untokenized text */
      }
      .highlight code { font: inherit; }
      #editor {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        resize: none;
        outline: 0;
        overflow: auto;
        background: transparent;
        color: transparent;
        caret-color: var(--fg);
      }
      #editor::selection { background: color-mix(in srgb, var(--accent) 30%, transparent); }
      #results {
        border-top: 1px solid var(--border);
        background: var(--panel);
        max-height: 42vh;
        overflow: auto;
        padding: 12px 18px;
        font-size: 13px;
      }
      #results.stale { opacity: 0.5; }
      .verdict { font-weight: 600; margin-bottom: 6px; }
      .verdict.ok { color: var(--ok); }
      .verdict.bad { color: var(--bad); }
      .verdict.busy { color: var(--busy); }
      .note { color: var(--muted); font-size: 12px; }
      ul.findings { list-style: none; margin: 8px 0 0; padding: 0; }
      ul.findings li {
        padding: 6px 8px;
        border-left: 3px solid var(--bad);
        background: color-mix(in srgb, var(--bad) 8%, transparent);
        margin-bottom: 6px;
        border-radius: 0 4px 4px 0;
        font-family: var(--mono);
        font-size: 12px;
      }
      ul.findings li.err { border-left-color: var(--busy); background: color-mix(in srgb, var(--busy) 10%, transparent); }
      .loc { color: var(--accent); cursor: pointer; }
      .progress {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 8px;
      }
      .progress > div { height: 100%; background: var(--busy); width: 0; transition: width 0.1s linear; }
    </style>
  </head>
  <body>
    <header>
      <h1>Cavalry <span style="color: var(--ok);">Verifier</span></h1>
      <label class="example-picker">Example
        <select id="example-picker"></select>
      </label>
      <span id="status" class="pill busy">booting…</span>
    </header>
    <main>
      <div class="editor-wrap">
        <div id="gutter" class="gutter" aria-hidden="true"></div>
        <div class="code-scroll">
          <pre id="highlight" class="highlight" aria-hidden="true"><code id="highlight-code"></code></pre>
          <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" wrap="off"></textarea>
        </div>
      </div>
      <section id="results">
        <div class="verdict busy">Loading Z3…</div>
      </section>
    </main>
    <!-- Order matters: the OCaml pipeline and Z3's Emscripten module each set a
         global (cavalryObligations / initZ3); the z3-solver API bundle and the
         solve core read them; app.js drives it all. Everything runs on the main
         thread -- Z3 itself solves in its own worker threads. -->
    <script src="./verifier.bc.js"></script>
    <script src="./z3-built.js"></script>
    <script src="./dist/z3-api.js"></script>
    <!-- Shiki highlighter (grammar + themes), self-contained; sets
         cavalryHighlight synchronously so app.js can paint the first frame. -->
    <script src="./dist/highlight.js"></script>
    <!-- Example programs (generated from the README snippets); sets
         cavalryExamples for the header picker. -->
    <script src="./dist/examples.js"></script>
    <script src="./verify-core.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
