name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ocaml-compiler:
          - "5.5.0"
          - "4.14.4" # lowest OCaml version supported, per cavalry.opam

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true
          # Pin the opam-repository commit so setup-ocaml's cache key stays
          # stable. Otherwise it tracks upstream HEAD (which moves many times a
          # day), invalidating the opam switch cache on nearly every run and
          # forcing a full rebuild of the heavy deps (why3, alt-ergo). Bump this
          # SHA manually to pick up newer dependency versions.
          opam-repositories: |
            default: https://github.com/ocaml/opam-repository.git#d4a5573a48263007395b46a5dffbdcfbce894d0e

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Detect why3 provers
        run: opam exec -- why3 config detect

      - name: Install ocamlformat
        run: opam install "ocamlformat.$(sed -n 's/^version *= *//p' .ocamlformat)"

      - name: Check formatting
        run: opam exec -- dune build @fmt

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune build @runtest

      # zanuda is a typedtree-based linter tightly coupled to the OCaml
      # compiler; its releases don't support 5.5.0, so this runs only on the
      # 4.14 leg. It reports via OCaml alerts and doesn't fail on findings, so
      # continue-on-error keeps it advisory rather than a blocking gate.
      - name: Lint (zanuda)
        if: matrix.ocaml-compiler == '4.14.4'
        continue-on-error: true
        run: |
          opam install zanuda -y
          opam exec -- dune build @check
          opam exec -- zanuda -dir . -del-prefix "$(pwd)"
