name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ocaml-compiler:
          - "5.5.0"
          - "4.14.4" # lowest OCaml version supported, per cavalry.opam

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true
          # Pin the opam-repository commit for reproducibility: the resolved
          # dependency set (and thus the switch cache below) only changes when
          # this SHA or cavalry.opam does. Bump manually to pick up newer deps.
          opam-repositories: |
            default: https://github.com/ocaml/opam-repository.git#d4a5573a48263007395b46a5dffbdcfbce894d0e

      # setup-ocaml's own cache only stores opam's download cache + repo
      # metadata, so 'opam install' still recompiles all ~90 deps (why3,
      # core...) every run — ~3 min. Cache the built switch itself so
      # a hit makes 'opam install --deps-only' a near no-op. Bump the numeric
      # suffix to force a rebuild if the switch ever gets into a bad state.
      - name: Cache opam switch
        uses: actions/cache@v4
        with:
          path: _opam
          key: opam-switch-v1-${{ matrix.ocaml-compiler }}-${{ hashFiles('cavalry.opam') }}

      - name: Install dependencies
        run: opam install . --deps-only --with-test --with-doc

      # Z3 is the SMT backend and must be on PATH before `why3 config detect`
      # can register it. It is not an opam package (the dev shell gets it from
      # Nix), so provision the pinned 4.16.0 release binary directly: apt's Z3
      # is too old for the pin. The x64-glibc-2.39 build matches ubuntu-latest
      # (24.04); glibc is backward-compatible, so it keeps working on newer
      # runner images.
      - name: Install Z3 4.16.0
        run: |
          curl -fsSL -o "$RUNNER_TEMP/z3.zip" \
            https://github.com/Z3Prover/z3/releases/download/z3-4.16.0/z3-4.16.0-x64-glibc-2.39.zip
          unzip -q "$RUNNER_TEMP/z3.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/z3-4.16.0-x64-glibc-2.39/bin" >> "$GITHUB_PATH"

      - name: Detect why3 provers
        run: opam exec -- why3 config detect

      - name: Install ocamlformat
        run: opam install "ocamlformat.$(sed -n 's/^version *= *//p' .ocamlformat)"

      - name: Check formatting
        run: opam exec -- dune build @fmt

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune build @runtest

      # zanuda is a typedtree-based linter tightly coupled to the OCaml
      # compiler; its releases don't support 5.5.0, so this runs only on the
      # 4.14 leg. It reports via OCaml alerts and doesn't fail on findings, so
      # continue-on-error keeps it advisory rather than a blocking gate.
      - name: Lint (zanuda)
        if: matrix.ocaml-compiler == '4.14.4'
        continue-on-error: true
        run: |
          opam install zanuda -y
          opam exec -- dune build @check
          opam exec -- zanuda -dir . -del-prefix "$(pwd)"

  # Runs concurrently with the build matrix (no `needs`) so the odoc build
  # doesn't extend the critical path. Doc generation only compiles the modules,
  # so it skips the test run and prover detection the build job needs.
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5.0"
          dune-cache: true
          # Match the build job's pin so the resolved dependency set (and the
          # switch cache below) stays identical between the two jobs.
          opam-repositories: |
            default: https://github.com/ocaml/opam-repository.git#d4a5573a48263007395b46a5dffbdcfbce894d0e

      # Same key as the build job's 5.5.0 leg, so whichever job populates the
      # switch first is reused by the other.
      - name: Cache opam switch
        uses: actions/cache@v4
        with:
          path: _opam
          key: opam-switch-v1-5.5.0-${{ hashFiles('cavalry.opam') }}

      - name: Install dependencies
        run: opam install . --deps-only --with-test --with-doc

      - name: Build docs
        run: opam exec -- dune build @doc
