<svg xmlns="http://www.w3.org/2000/svg" width="731" height="389" viewBox="0 0 731 389" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#6A9955">// Booleans are first-class. Guards combine comparisons with `&amp;&amp;`, `||`, and `!`</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#6A9955">// and short-circuit like most languages, so `a[i]` is only read while</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#6A9955">// `i &lt; len(a)`. The flag `found` is a boolean variable, updated by a one-armed</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#6A9955">// `if` (no `else`) and asserted directly in the postcondition.</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#DCDCAA">len</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">) &gt;= </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#9CDCFE">found</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#569CD6">false</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#C586C0">while</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> &lt; </tspan><tspan fill="#DCDCAA">len</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">) &amp;&amp; !</tspan><tspan fill="#9CDCFE">found</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#C586C0">do</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">invariant</tspan><tspan fill="#D4D4D4"> {</tspan></text>
  <text x="18" y="219" xml:space="preserve"><tspan fill="#D4D4D4">    </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &lt;= </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> &lt;= </tspan><tspan fill="#DCDCAA">len</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">) &amp;&amp;</tspan></text>
  <text x="18" y="240" xml:space="preserve"><tspan fill="#D4D4D4">    (</tspan><tspan fill="#9CDCFE">found</tspan><tspan fill="#D4D4D4"> -&gt; </tspan><tspan fill="#569CD6">exists</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> . </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &lt;= </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> &lt; </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">[</tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4">] = </tspan><tspan fill="#B5CEA8">7</tspan><tspan fill="#D4D4D4">)</tspan></text>
  <text x="18" y="261" xml:space="preserve"><tspan fill="#D4D4D4">  }</tspan></text>
  <text x="18" y="282" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">variant</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#DCDCAA">len</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">) - </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="303" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#C586C0">if</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">[</tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4">] = </tspan><tspan fill="#B5CEA8">7</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#C586C0">then</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">found</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#569CD6">true</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#C586C0">end</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="324" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> + </tspan><tspan fill="#B5CEA8">1</tspan></text>
  <text x="18" y="345" xml:space="preserve"><tspan fill="#C586C0">end</tspan></text>
  <text x="18" y="366" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#9CDCFE">found</tspan><tspan fill="#D4D4D4"> -&gt; </tspan><tspan fill="#569CD6">exists</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> . </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &lt;= </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> &lt; </tspan><tspan fill="#DCDCAA">len</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">) &amp;&amp; </tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">[</tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4">] = </tspan><tspan fill="#B5CEA8">7</tspan><tspan fill="#D4D4D4"> }</tspan></text>
</svg>
