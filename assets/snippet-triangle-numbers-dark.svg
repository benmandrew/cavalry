<svg xmlns="http://www.w3.org/2000/svg" width="705" height="284" viewBox="0 0 705 284" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#6A9955">// Sum 0 + 1 + ... + (n-1), the (n-1)th triangle number. The invariant is</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#6A9955">// phrased as 2*x = ... so the proof stays over integers and avoids division.</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">n</tspan><tspan fill="#D4D4D4"> &gt;= </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#C586C0">while</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> &lt; </tspan><tspan fill="#9CDCFE">n</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#C586C0">do</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#6A9955">// twice the running sum equals i*(i-1); i has climbed no further than n</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">invariant</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#B5CEA8">2</tspan><tspan fill="#D4D4D4"> * </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> * (</tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> - </tspan><tspan fill="#B5CEA8">1</tspan><tspan fill="#D4D4D4">) &amp;&amp; </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &lt;= </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> &lt;= </tspan><tspan fill="#9CDCFE">n</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">variant</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#9CDCFE">n</tspan><tspan fill="#D4D4D4"> - </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> + </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#9CDCFE">i</tspan><tspan fill="#D4D4D4"> + </tspan><tspan fill="#B5CEA8">1</tspan></text>
  <text x="18" y="219" xml:space="preserve"><tspan fill="#C586C0">end</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="240" xml:space="preserve"><tspan fill="#9CDCFE">x</tspan></text>
  <text x="18" y="261" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#B5CEA8">2</tspan><tspan fill="#D4D4D4"> * </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#9CDCFE">n</tspan><tspan fill="#D4D4D4"> * (</tspan><tspan fill="#9CDCFE">n</tspan><tspan fill="#D4D4D4"> - </tspan><tspan fill="#B5CEA8">1</tspan><tspan fill="#D4D4D4">) }</tspan></text>
</svg>
