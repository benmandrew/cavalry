<svg xmlns="http://www.w3.org/2000/svg" width="731" height="305" viewBox="0 0 731 305" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#FFFFFF" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#008000">// A procedure can return a value: `returns { r : ty }` names the result binder</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#008000">// its `ensures` constrains, the body assigns it, and a call binds the result at</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#008000">// an assignment. The caller still reasons from the contract alone.</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#AF00DB">procedure</tspan><tspan fill="#000000"> </tspan><tspan fill="#569CD6">max</tspan><tspan fill="#000000"> (</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">, </tspan><tspan fill="#001080">b</tspan><tspan fill="#000000">) </tspan><tspan fill="#001080">returns</tspan><tspan fill="#000000"> { </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> : </tspan><tspan fill="#001080">int</tspan><tspan fill="#000000"> } =</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">requires</tspan><tspan fill="#000000"> { </tspan><tspan fill="#0000FF">true</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">ensures</tspan><tspan fill="#000000"> { </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> &gt;= </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> &gt;= </tspan><tspan fill="#001080">b</tspan><tspan fill="#000000"> &amp;&amp; (</tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> = </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000"> || </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> = </tspan><tspan fill="#001080">b</tspan><tspan fill="#000000">) }</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">writes</tspan><tspan fill="#000000"> { }</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#AF00DB">if</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000"> &gt;= </tspan><tspan fill="#001080">b</tspan><tspan fill="#000000"> </tspan><tspan fill="#AF00DB">then</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> := </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000"> </tspan><tspan fill="#AF00DB">else</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> := </tspan><tspan fill="#001080">b</tspan><tspan fill="#000000"> </tspan><tspan fill="#AF00DB">end</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#AF00DB">end</tspan></text>
  <text x="18" y="219" xml:space="preserve"></text>
  <text x="18" y="240" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#0000FF">true</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="261" xml:space="preserve"><tspan fill="#001080">m</tspan><tspan fill="#000000"> := </tspan><tspan fill="#569CD6">max</tspan><tspan fill="#000000">(</tspan><tspan fill="#098658">3</tspan><tspan fill="#000000">, </tspan><tspan fill="#098658">7</tspan><tspan fill="#000000">)</tspan></text>
  <text x="18" y="282" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#001080">m</tspan><tspan fill="#000000"> = </tspan><tspan fill="#098658">7</tspan><tspan fill="#000000"> }</tspan></text>
</svg>
