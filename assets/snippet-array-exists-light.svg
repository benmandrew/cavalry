<svg xmlns="http://www.w3.org/2000/svg" width="601" height="158" viewBox="0 0 601 158" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#FFFFFF" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#008000">// `exists` asserts that some element satisfies a property; here,</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#008000">// index 0 witnesses that a 7 is present after the write.</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#001080">n</tspan><tspan fill="#000000"> &gt; </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#001080">a</tspan><tspan fill="#000000"> := </tspan><tspan fill="#795E26">array</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">n</tspan><tspan fill="#000000">);</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#001080">a</tspan><tspan fill="#000000">[</tspan><tspan fill="#098658">0</tspan><tspan fill="#000000">] := </tspan><tspan fill="#098658">7</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#0000FF">exists</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> . </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &lt; </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) &amp;&amp; </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">[</tspan><tspan fill="#001080">j</tspan><tspan fill="#000000">] = </tspan><tspan fill="#098658">7</tspan><tspan fill="#000000"> }</tspan></text>
</svg>
