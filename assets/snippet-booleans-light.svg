<svg xmlns="http://www.w3.org/2000/svg" width="731" height="389" viewBox="0 0 731 389" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#FFFFFF" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#008000">// Booleans are first-class. Guards combine comparisons with `&amp;&amp;`, `||`, and `!`</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#008000">// and short-circuit like most languages, so `a[i]` is only read while</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#008000">// `i &lt; len(a)`. The flag `found` is a boolean variable, updated by a one-armed</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#008000">// `if` (no `else`) and asserted directly in the postcondition.</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) &gt;= </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#001080">i</tspan><tspan fill="#000000"> := </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#001080">found</tspan><tspan fill="#000000"> := </tspan><tspan fill="#0000FF">false</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#AF00DB">while</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt; </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) &amp;&amp; !</tspan><tspan fill="#001080">found</tspan><tspan fill="#000000"> </tspan><tspan fill="#AF00DB">do</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">invariant</tspan><tspan fill="#000000"> {</tspan></text>
  <text x="18" y="219" xml:space="preserve"><tspan fill="#000000">    </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) &amp;&amp;</tspan></text>
  <text x="18" y="240" xml:space="preserve"><tspan fill="#000000">    (</tspan><tspan fill="#001080">found</tspan><tspan fill="#000000"> -&gt; </tspan><tspan fill="#0000FF">exists</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> . </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &lt; </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">[</tspan><tspan fill="#001080">j</tspan><tspan fill="#000000">] = </tspan><tspan fill="#098658">7</tspan><tspan fill="#000000">)</tspan></text>
  <text x="18" y="261" xml:space="preserve"><tspan fill="#000000">  }</tspan></text>
  <text x="18" y="282" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">variant</tspan><tspan fill="#000000"> { </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) - </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="303" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#AF00DB">if</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">[</tspan><tspan fill="#001080">i</tspan><tspan fill="#000000">] = </tspan><tspan fill="#098658">7</tspan><tspan fill="#000000"> </tspan><tspan fill="#AF00DB">then</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">found</tspan><tspan fill="#000000"> := </tspan><tspan fill="#0000FF">true</tspan><tspan fill="#000000"> </tspan><tspan fill="#AF00DB">end</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="324" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> := </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> + </tspan><tspan fill="#098658">1</tspan></text>
  <text x="18" y="345" xml:space="preserve"><tspan fill="#AF00DB">end</tspan></text>
  <text x="18" y="366" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#001080">found</tspan><tspan fill="#000000"> -&gt; </tspan><tspan fill="#0000FF">exists</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> . </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &lt; </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) &amp;&amp; </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">[</tspan><tspan fill="#001080">j</tspan><tspan fill="#000000">] = </tspan><tspan fill="#098658">7</tspan><tspan fill="#000000"> }</tspan></text>
</svg>
