<svg xmlns="http://www.w3.org/2000/svg" width="731" height="305" viewBox="0 0 731 305" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#6A9955">// A procedure can return a value: `returns { r : ty }` names the result binder</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#6A9955">// its `ensures` constrains, the body assigns it, and a call binds the result at</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#6A9955">// an assignment. The caller still reasons from the contract alone.</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#C586C0">procedure</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#569CD6">max</tspan><tspan fill="#D4D4D4"> (</tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">, </tspan><tspan fill="#9CDCFE">b</tspan><tspan fill="#D4D4D4">) </tspan><tspan fill="#9CDCFE">returns</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> : </tspan><tspan fill="#9CDCFE">int</tspan><tspan fill="#D4D4D4"> } =</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">requires</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#569CD6">true</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">ensures</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> &gt;= </tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> &gt;= </tspan><tspan fill="#9CDCFE">b</tspan><tspan fill="#D4D4D4"> &amp;&amp; (</tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4"> || </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#9CDCFE">b</tspan><tspan fill="#D4D4D4">) }</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">writes</tspan><tspan fill="#D4D4D4"> { }</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#C586C0">if</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4"> &gt;= </tspan><tspan fill="#9CDCFE">b</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#C586C0">then</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#C586C0">else</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#9CDCFE">b</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#C586C0">end</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#C586C0">end</tspan></text>
  <text x="18" y="219" xml:space="preserve"></text>
  <text x="18" y="240" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#569CD6">true</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="261" xml:space="preserve"><tspan fill="#9CDCFE">m</tspan><tspan fill="#D4D4D4"> := </tspan><tspan fill="#569CD6">max</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#B5CEA8">3</tspan><tspan fill="#D4D4D4">, </tspan><tspan fill="#B5CEA8">7</tspan><tspan fill="#D4D4D4">)</tspan></text>
  <text x="18" y="282" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#9CDCFE">m</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#B5CEA8">7</tspan><tspan fill="#D4D4D4"> }</tspan></text>
</svg>
