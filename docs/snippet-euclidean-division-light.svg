<svg xmlns="http://www.w3.org/2000/svg" width="731" height="557" viewBox="0 0 731 557" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#FFFFFF" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#008000">// A procedure carries a contract: `requires` is its precondition, `ensures` its</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#008000">// postcondition, and `writes` frames which globals it is allowed to modify.</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#AF00DB">procedure</tspan><tspan fill="#000000"> </tspan><tspan fill="#569CD6">euclidean_div</tspan><tspan fill="#000000"> () =</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">requires</tspan><tspan fill="#000000"> { </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> &gt;= </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">y</tspan><tspan fill="#000000"> &gt; </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">ensures</tspan><tspan fill="#000000"> { </tspan><tspan fill="#001080">q</tspan><tspan fill="#000000"> = </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> / </tspan><tspan fill="#001080">y</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> = </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> % </tspan><tspan fill="#001080">y</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">writes</tspan><tspan fill="#000000"> { </tspan><tspan fill="#001080">q</tspan><tspan fill="#000000">, </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#001080">q</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#AF00DB">while</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> &gt;= </tspan><tspan fill="#001080">y</tspan><tspan fill="#000000"> </tspan><tspan fill="#AF00DB">do</tspan></text>
  <text x="18" y="219" xml:space="preserve"><tspan fill="#000000">    </tspan><tspan fill="#0000FF" font-style="italic">invariant</tspan><tspan fill="#000000"> { </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> = </tspan><tspan fill="#001080">q</tspan><tspan fill="#000000"> * </tspan><tspan fill="#001080">y</tspan><tspan fill="#000000"> + </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="240" xml:space="preserve"><tspan fill="#000000">    </tspan><tspan fill="#0000FF" font-style="italic">variant</tspan><tspan fill="#000000"> { </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="261" xml:space="preserve"><tspan fill="#000000">    </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> - </tspan><tspan fill="#001080">y</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="282" xml:space="preserve"><tspan fill="#000000">    </tspan><tspan fill="#001080">q</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#001080">q</tspan><tspan fill="#000000"> + </tspan><tspan fill="#098658">1</tspan></text>
  <text x="18" y="303" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#AF00DB">end</tspan></text>
  <text x="18" y="324" xml:space="preserve"><tspan fill="#AF00DB">end</tspan></text>
  <text x="18" y="345" xml:space="preserve"></text>
  <text x="18" y="366" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#0000FF">true</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="387" xml:space="preserve"><tspan fill="#001080">x</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#098658">42</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="408" xml:space="preserve"><tspan fill="#001080">y</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#098658">17</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="429" xml:space="preserve"><tspan fill="#001080">q</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="450" xml:space="preserve"><tspan fill="#001080">r</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="471" xml:space="preserve"><tspan fill="#569CD6">euclidean_div</tspan><tspan fill="#000000">();</tspan></text>
  <text x="18" y="492" xml:space="preserve"><tspan fill="#569CD6">print</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">q</tspan><tspan fill="#000000">);</tspan></text>
  <text x="18" y="513" xml:space="preserve"><tspan fill="#569CD6">print</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">r</tspan><tspan fill="#000000">)</tspan></text>
  <text x="18" y="534" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#001080">q</tspan><tspan fill="#000000"> = </tspan><tspan fill="#098658">2</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">r</tspan><tspan fill="#000000"> = </tspan><tspan fill="#098658">8</tspan><tspan fill="#000000"> } </tspan><tspan fill="#008000">// 42 = 2 * 17 + 8</tspan></text>
</svg>
