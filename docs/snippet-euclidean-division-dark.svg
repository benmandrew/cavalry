<svg xmlns="http://www.w3.org/2000/svg" width="731" height="557" viewBox="0 0 731 557" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#6A9955">// A procedure carries a contract: `requires` is its precondition, `ensures` its</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#6A9955">// postcondition, and `writes` frames which globals it is allowed to modify.</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#C586C0">procedure</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#569CD6">euclidean_div</tspan><tspan fill="#D4D4D4"> () =</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">requires</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> &gt;= </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">y</tspan><tspan fill="#D4D4D4"> &gt; </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">ensures</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> / </tspan><tspan fill="#9CDCFE">y</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> % </tspan><tspan fill="#9CDCFE">y</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#569CD6" font-style="italic">writes</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4">, </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#C586C0">while</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> &gt;= </tspan><tspan fill="#9CDCFE">y</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#C586C0">do</tspan></text>
  <text x="18" y="219" xml:space="preserve"><tspan fill="#D4D4D4">    </tspan><tspan fill="#569CD6" font-style="italic">invariant</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4"> * </tspan><tspan fill="#9CDCFE">y</tspan><tspan fill="#D4D4D4"> + </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &lt;= </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="240" xml:space="preserve"><tspan fill="#D4D4D4">    </tspan><tspan fill="#569CD6" font-style="italic">variant</tspan><tspan fill="#D4D4D4"> { </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="261" xml:space="preserve"><tspan fill="#D4D4D4">    </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> - </tspan><tspan fill="#9CDCFE">y</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="282" xml:space="preserve"><tspan fill="#D4D4D4">    </tspan><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4"> + </tspan><tspan fill="#B5CEA8">1</tspan></text>
  <text x="18" y="303" xml:space="preserve"><tspan fill="#D4D4D4">  </tspan><tspan fill="#C586C0">end</tspan></text>
  <text x="18" y="324" xml:space="preserve"><tspan fill="#C586C0">end</tspan></text>
  <text x="18" y="345" xml:space="preserve"></text>
  <text x="18" y="366" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#569CD6">true</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="387" xml:space="preserve"><tspan fill="#9CDCFE">x</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#B5CEA8">42</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="408" xml:space="preserve"><tspan fill="#9CDCFE">y</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#B5CEA8">17</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="429" xml:space="preserve"><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="450" xml:space="preserve"><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4">;</tspan></text>
  <text x="18" y="471" xml:space="preserve"><tspan fill="#569CD6">euclidean_div</tspan><tspan fill="#D4D4D4">();</tspan></text>
  <text x="18" y="492" xml:space="preserve"><tspan fill="#569CD6">print</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4">);</tspan></text>
  <text x="18" y="513" xml:space="preserve"><tspan fill="#569CD6">print</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4">)</tspan></text>
  <text x="18" y="534" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#9CDCFE">q</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#B5CEA8">2</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">r</tspan><tspan fill="#D4D4D4"> = </tspan><tspan fill="#B5CEA8">8</tspan><tspan fill="#D4D4D4"> } </tspan><tspan fill="#6A9955">// 42 = 2 * 17 + 8</tspan></text>
</svg>
