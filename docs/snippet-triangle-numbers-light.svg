<svg xmlns="http://www.w3.org/2000/svg" width="705" height="284" viewBox="0 0 705 284" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#FFFFFF" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#008000">// Sum 0 + 1 + ... + (n-1), the (n-1)th triangle number. The invariant is</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#008000">// phrased as 2*x = ... so the proof stays over integers and avoids division.</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> = </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> = </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">n</tspan><tspan fill="#000000"> &gt;= </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#AF00DB">while</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt; </tspan><tspan fill="#001080">n</tspan><tspan fill="#000000"> </tspan><tspan fill="#AF00DB">do</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#008000">// twice the running sum equals i*(i-1); i has climbed no further than n</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">invariant</tspan><tspan fill="#000000"> { </tspan><tspan fill="#098658">2</tspan><tspan fill="#000000"> * </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> = </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> * (</tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> - </tspan><tspan fill="#098658">1</tspan><tspan fill="#000000">) &amp;&amp; </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">n</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">variant</tspan><tspan fill="#000000"> { </tspan><tspan fill="#001080">n</tspan><tspan fill="#000000"> - </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> + </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> + </tspan><tspan fill="#098658">1</tspan></text>
  <text x="18" y="219" xml:space="preserve"><tspan fill="#AF00DB">end</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="240" xml:space="preserve"><tspan fill="#001080">x</tspan></text>
  <text x="18" y="261" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#098658">2</tspan><tspan fill="#000000"> * </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> = </tspan><tspan fill="#001080">n</tspan><tspan fill="#000000"> * (</tspan><tspan fill="#001080">n</tspan><tspan fill="#000000"> - </tspan><tspan fill="#098658">1</tspan><tspan fill="#000000">) }</tspan></text>
</svg>
