<svg xmlns="http://www.w3.org/2000/svg" width="700" height="242" viewBox="0 0 700 242" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#FFFFFF" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#001080">n</tspan><tspan fill="#000000"> &gt;= </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#001080">a</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#795E26">array</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">n</tspan><tspan fill="#000000">);</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#AF00DB">while</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt; </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) </tspan><tspan fill="#AF00DB">do</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">invariant</tspan><tspan fill="#000000"> { </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) &amp;&amp; </tspan><tspan fill="#0000FF">forall</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> . </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &lt; </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> -&gt; </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">[</tspan><tspan fill="#001080">j</tspan><tspan fill="#000000">] = </tspan><tspan fill="#098658">5</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#0000FF" font-style="italic">variant</tspan><tspan fill="#000000"> { </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) - </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="156" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">[</tspan><tspan fill="#001080">i</tspan><tspan fill="#000000">] &lt;- </tspan><tspan fill="#098658">5</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="177" xml:space="preserve"><tspan fill="#000000">  </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#001080">i</tspan><tspan fill="#000000"> + </tspan><tspan fill="#098658">1</tspan></text>
  <text x="18" y="198" xml:space="preserve"><tspan fill="#AF00DB">end</tspan></text>
  <text x="18" y="219" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#0000FF">forall</tspan><tspan fill="#000000"> </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> . </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> &lt;= </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &amp;&amp; </tspan><tspan fill="#001080">j</tspan><tspan fill="#000000"> &lt; </tspan><tspan fill="#795E26">len</tspan><tspan fill="#000000">(</tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">) -&gt; </tspan><tspan fill="#001080">a</tspan><tspan fill="#000000">[</tspan><tspan fill="#001080">j</tspan><tspan fill="#000000">] = </tspan><tspan fill="#098658">5</tspan><tspan fill="#000000"> }</tspan></text>
</svg>
