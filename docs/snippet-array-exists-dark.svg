<svg xmlns="http://www.w3.org/2000/svg" width="601" height="158" viewBox="0 0 601 158" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#6A9955">// `exists` asserts that some element satisfies a property; here,</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#6A9955">// index 0 witnesses that a 7 is present after the write.</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#9CDCFE">n</tspan><tspan fill="#D4D4D4"> &gt; </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> }</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4"> &lt;- </tspan><tspan fill="#DCDCAA">array</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">n</tspan><tspan fill="#D4D4D4">);</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">[</tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4">] &lt;- </tspan><tspan fill="#B5CEA8">7</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#D4D4D4">{ </tspan><tspan fill="#569CD6">exists</tspan><tspan fill="#D4D4D4"> </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> . </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4"> &lt;= </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> &amp;&amp; </tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4"> &lt; </tspan><tspan fill="#DCDCAA">len</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">) &amp;&amp; </tspan><tspan fill="#9CDCFE">a</tspan><tspan fill="#D4D4D4">[</tspan><tspan fill="#9CDCFE">j</tspan><tspan fill="#D4D4D4">] = </tspan><tspan fill="#B5CEA8">7</tspan><tspan fill="#D4D4D4"> }</tspan></text>
</svg>
