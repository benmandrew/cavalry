<svg xmlns="http://www.w3.org/2000/svg" width="575" height="158" viewBox="0 0 575 158" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14">
  <rect width="100%" height="100%" fill="#FFFFFF" rx="10"/>
  <text x="18" y="30" xml:space="preserve"><tspan fill="#008000">// A Hoare triple {P} c {Q}: if P holds before c runs, Q holds</tspan></text>
  <text x="18" y="51" xml:space="preserve"><tspan fill="#008000">// after — a fact proved without executing the code.</tspan></text>
  <text x="18" y="72" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> &gt;= </tspan><tspan fill="#098658">0</tspan><tspan fill="#000000"> }</tspan></text>
  <text x="18" y="93" xml:space="preserve"><tspan fill="#001080">y</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> + </tspan><tspan fill="#098658">1</tspan><tspan fill="#000000">;</tspan></text>
  <text x="18" y="114" xml:space="preserve"><tspan fill="#001080">z</tspan><tspan fill="#000000"> &lt;- </tspan><tspan fill="#098658">2</tspan><tspan fill="#000000"> * </tspan><tspan fill="#001080">y</tspan></text>
  <text x="18" y="135" xml:space="preserve"><tspan fill="#000000">{ </tspan><tspan fill="#001080">z</tspan><tspan fill="#000000"> = </tspan><tspan fill="#098658">2</tspan><tspan fill="#000000"> * </tspan><tspan fill="#001080">x</tspan><tspan fill="#000000"> + </tspan><tspan fill="#098658">2</tspan><tspan fill="#000000"> }</tspan></text>
</svg>
